[models]
planner = "anthropic/claude-opus-4"
executor = "gemini-3-flash-preview"
mediator = "openai/gpt-5.4"

[budgets]
max_skill_tokens = 4000

[experiment]
num_iterations = 30
coevo_interval = 5          # co-evolution reflection every N iterations
advisor_buffer_max = 10     # review+commit executor skill proposals every N iterations
seed = 42

[paths]
skills_dir = "skills"
data_dir = "data"
benchmarks_dir = "benchmarks/skillsbench"

[executor_runtime]
backend = "skillsbench"
agent_name = "gemini"
jobs_dir = "jobs"
task_dirs = ["tasks"]
injected_skill_name = "executor-evolved"
