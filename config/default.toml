[models]
planner = "anthropic/claude-opus-4"
executor = "gemini/gemini-2.5-pro"
mediator = "openai/gpt-5.4"

[budgets]
mediator_report_tokens = 2000
max_skill_tokens = 4000

[experiment]
num_iterations = 30
coevo_interval = 5          # co-evolution reflection every N iterations
seed = 42

[sandbox]
type = "harbor"
timeout_sec = 300

[paths]
skills_dir = "skills"
data_dir = "data"
benchmarks_dir = "benchmarks/skillsbench"

[executor_runtime]
backend = "skillsbench"
agent_name = "codex"
jobs_dir = "jobs"
task_dirs = ["tasks"]
injected_skill_name = "executor-evolved"
