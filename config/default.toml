[models]
planner = "openrouter/anthropic/claude-opus-4"
executor = "openrouter/google/gemini-3-flash-preview"
mediator = "openrouter/openai/gpt-5.4"

[budgets]
max_skill_tokens = 4000
trace_excerpt_tokens = 6000
historical_summary_tokens = 3000
mediator_report_tokens = 4000
planner_context_tokens = 24000
skill_update_diff_tokens = 6000
mediator_prompt_tokens = 16000
advisor_prompt_tokens = 12000
reflector_prompt_tokens = 16000
planner_completion_tokens = 4096
mediator_completion_tokens = 2048
advisor_completion_tokens = 512
reflector_completion_tokens = 4096

[experiment]
num_iterations = 30
coevo_interval = 5          # co-evolution reflection every N iterations
advisor_buffer_max = 10     # review+commit executor skill proposals every N iterations
seed = 42
allow_cross_task_feedback = false

[paths]
skills_dir = "skills"
data_dir = "data"
benchmarks_dir = "benchmarks/skillsbench"

[executor_runtime]
backend = "skillsbench"
agent_name = "opencode"
jobs_dir = "jobs"
task_dirs = ["tasks"]
injected_skill_name = "executor-evolved"
